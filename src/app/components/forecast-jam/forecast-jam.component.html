<div class="hourly-forecast">
    <div class="forecast-list">
    <div *ngFor="let item of allWeather" class="forecast-item" (click)="select(item)" [class.active]="isActive(item)">
      <span class="time">{{ item.local_datetime | date:'HH' }}</span>
      <img [src]="getWeatherIcon(item.image)" [alt]="item.weather_desc">
      <span class="temp">{{ item.t }}°</span>
    </div>
  </div>
</div>
